services:
  kokoro-tts:
    build: .
    image: digimine-kokoro-tts:latest
    container_name: kokoro-tts
    restart: unless-stopped
    ports:
      - "2001:2001"
    environment:
      PORT: "2001"
      # Set a strong shared secret and put the SAME value in the web app's
      # KOKORO_TTS_SECRET env so only your server can call this service.
      KOKORO_TTS_SECRET: "${KOKORO_TTS_SECRET:-}"
      KOKORO_DTYPE: "q8"
    volumes:
      # Persist the downloaded model so restarts don't re-download it.
      - kokoro-cache:/app/.cache
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:2001/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 300s

volumes:
  kokoro-cache:
