packages:
  - "apps/*"
  # The Expo app manages its own npm install — React Native's Metro bundler
  # and pnpm's symlinked node_modules don't mix reliably, so it lives outside
  # the pnpm workspace on purpose.
  - "!apps/mobile"
  # The Electron desktop agent (Virtual Lab) also manages its own install —
  # Electron + native input modules don't belong in the web monorepo tree.
  - "!apps/lab-agent"
  - "packages/*"
  - "firebase/functions"
