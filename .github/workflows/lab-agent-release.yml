name: Build Lab Agent

# Builds the Virtual Lab desktop agent (apps/lab-agent) installers for macOS and
# Windows and (when the FIREBASE_SERVICE_ACCOUNT secret is set) uploads them to
# Firebase Storage with stable public download URLs the in-app download buttons
# point at. The installers are also attached to the workflow run as artifacts.
#
# Run it from the Actions tab (workflow_dispatch) or by pushing a tag
# `lab-agent-v*` (e.g. `git tag lab-agent-v0.1.0 && git push origin lab-agent-v0.1.0`).
#
# Required repo secret for the Firebase upload step:
#   FIREBASE_SERVICE_ACCOUNT  — the full service-account JSON for digimine-1c33f
# (without it the build still runs; you just download the installers from the
# run's Artifacts instead of them landing in Storage).

on:
  workflow_dispatch:
  push:
    tags:
      - "lab-agent-v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            cmd: dist:mac
            ext: dmg
            dest: lab-agent/PlacementRanker-Lab-Agent-macOS-arm64.dmg
            token: 7c1e9a40-6b2d-4f83-9a1e-2d5b8c4f0a11
          - os: windows-latest
            cmd: dist:win
            ext: exe
            dest: lab-agent/PlacementRanker-Lab-Agent-Windows-x64.exe
            token: b2d4f6a8-1c3e-4b5d-8e7f-0a1b2c3d4e5f
    runs-on: ${{ matrix.os }}
    env:
      FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      STORAGE_BUCKET: digimine-1c33f.firebasestorage.app
      # Self-signed Authenticode cert (base64 .pfx) + its password. Signs the
      # Windows installer so it carries a publisher identity (no "Unknown
      # Publisher") and can be trusted org-wide. NOT CA-trusted, so SmartScreen
      # still warns for the public — see docs.
      WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
      WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
    defaults:
      run:
        working-directory: apps/lab-agent
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        # `npm install` (not `npm ci`): the agent's package-lock.json is
        # gitignored under the pnpm-monorepo policy, so there's no committed
        # lockfile to `ci` against. The agent is self-contained (livekit-client
        # + dev deps); native modules (nut-js) ship per-platform prebuilds.
        run: npm install --no-audit --no-fund

      - name: Build installer
        run: npm run ${{ matrix.cmd }}
        env:
          # macOS is ad-hoc signed by build/afterPack.js (no Developer ID);
          # don't let electron-builder hunt the keychain for a real identity.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Sign Windows installer (self-signed)
        # Authenticode-sign the .exe with the self-signed cert. signtool succeeds
        # regardless of CA trust; the timestamp keeps the signature valid past
        # the cert's life. Get-AuthenticodeSignature Status will read NotTrusted
        # (self-signed) — expected; the signature is still present + valid-format.
        if: ${{ matrix.os == 'windows-latest' && env.WIN_CSC_LINK != '' }}
        shell: pwsh
        run: |
          $pfx = Join-Path $env:RUNNER_TEMP "cs.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WIN_CSC_LINK))
          $st = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" |
                Sort-Object FullName -Descending | Select-Object -First 1
          $exe = Get-ChildItem "release\*.exe" | Select-Object -First 1
          Write-Host "Signing $($exe.FullName) with $($st.FullName)"
          & $st.FullName sign /f $pfx /p $env:WIN_CSC_KEY_PASSWORD /fd sha256 `
            /tr http://timestamp.digicert.com /td sha256 $exe.FullName
          if ($LASTEXITCODE -ne 0) { throw "signtool failed ($LASTEXITCODE)" }
          $sig = Get-AuthenticodeSignature $exe.FullName
          Write-Host "Signed -> Status=$($sig.Status) Signer=$($sig.SignerCertificate.Subject)"
          Remove-Item $pfx -Force

      - name: Upload installer as a build artifact
        uses: actions/upload-artifact@v4
        with:
          name: lab-agent-${{ matrix.os }}
          path: |
            apps/lab-agent/release/*.dmg
            apps/lab-agent/release/*.exe
          if-no-files-found: error

      - name: Publish to Firebase Storage
        if: ${{ env.FIREBASE_SERVICE_ACCOUNT != '' }}
        run: |
          npm i firebase-admin@^12 --no-save
          node scripts/ci-upload-firebase.cjs ${{ matrix.ext }} "${{ matrix.dest }}" ${{ matrix.token }}
